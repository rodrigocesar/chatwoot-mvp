services:
  moonu-db:
    image: postgres:16-alpine
    container_name: moonu-db
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: moonu
      POSTGRES_PASSWORD: moonu
      POSTGRES_DB: moonu_simulator
    volumes:
      - moonu_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U moonu -d moonu_simulator']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  moonu_pg_data:
